included:
  - LearnHappyGerman

excluded:
  - LearnHappyGerman/LearnHappyGerman.xcodeproj
  - LearnHappyGerman/LearnHappyGerman.xcworkspace
  # SwiftData / Swift macro expansions (ephemeral paths under /var/.../swift-generated-sources/)
  - "**/swift-generated-sources"

strict: true

opt_in_rules:
  - force_unwrapping

force_unwrapping:
  severity: error

cyclomatic_complexity:
  warning: 10
  error: 15
  ignores_case_statements: true

vertical_whitespace:
  max_empty_lines: 1

identifier_name:
  min_length: 2
  max_length:
    warning: 40
    error: 50
  validates_start_with_lowercase: true
  excluded:
    - CodingKeys
  allowed_symbols:
    - _

type_name:
  min_length: 3
  max_length:
    warning: 45
    error: 55

custom_rules:
  grand_budapest_naming:
    name: "Grand Budapest Naming"
    regex: '\b(func|class|struct|enum|protocol)\s+[A-Za-z0-9]*_[A-Za-z0-9_]*\b'
    message: "Use Grand Budapest naming for API/type declarations; snake_case data keys are allowed for Codable mapping."
    severity: error

  symmetry_exception_marker:
    name: "Symmetry Exception Marker"
    regex: '\.padding\(\.(top|bottom|leading|trailing)'
    message: "Directional padding requires a symmetry exception comment: // SYMMETRY-EXCEPTION: <reason>"
    severity: warning

disabled_rules:
  - inclusive_language
